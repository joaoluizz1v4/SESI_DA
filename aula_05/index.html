<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Pug</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="lado-esquerdo">
        <h1 class="fala-pug">Bem-Vindo</h1>
    </div>

    <div class="lado-direito">
        <div class="conteudo-centralizado">
            <h1 class="texto-grande">Encontre tudo o que você precisa para seu animal de estimação</h1>

            <div class="botao">
                <img src="google.png" class="icone"> Entrar com Google
            </div>
            <div class="botao">
                <img src="apple (1).png" class="icone"> Entrar com Apple
            </div>
            <div class="botao">
                <img src="email.png" class="icone"> Entrar com E-mail
            </div>
            <p class="texto-ajuda">
                Você quer tentar de outra maneira? <a href="#">Saber mais</a>
            </p>
            <button class="botao-destaque">Vamos lá</button>
        </div>
    </div>
</body>
</html>
